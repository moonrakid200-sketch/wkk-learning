<!DOCTYPE html>
<html>
<head>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
    window.location.href = "https://nattapongkos.github.io/wkk/";
  </script>
</head>
<body></body>
</html>
